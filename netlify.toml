# The compiled CSS is checked in (resources/css/styles.css), so Netlify
# just publishes the repo as-is — no build step. To update styles, run
# `npm run build:css` locally and commit the result.

[build]
publish = "."
command = ""

[[headers]]
  for = "/resources/css/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/resources/js/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[build]
publish = "."
command = "npm run build:css"

[build.environment]
NODE_VERSION = "20"

[[headers]]
  for = "/resources/css/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/resources/js/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
